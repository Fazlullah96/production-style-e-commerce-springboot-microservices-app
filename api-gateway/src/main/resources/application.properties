spring.application.name=api-gateway
server.port=8080

logging.level.root=INFO
logging.level.com.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.com.springframework.cloud.gateway=TRACE

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webmvc.routes[0].id=product-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/product/**

spring.cloud.gateway.server.webmvc.routes[1].id=category-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/category/**

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411